[mypy]
# The root of your source
python_version = 3.11
warn_return_any = False
warn_unused_configs = True

# 1. THE "NOISE REDUCER"
# This stops Mypy from complaining about external libraries that don't have types.
ignore_missing_imports = True

# 2. THE "GRADUAL" SETTINGS
# Don't fail the build just because a library is missing a 'py.typed' marker
disable_error_code = import-untyped

# 3. SPECIFIC OVERRIDES
# Some libraries are notorious for bad typing
[mypy-requests.*]
ignore_missing_imports = True

[mypy-nest_asyncio.*]
ignore_missing_imports = True

[mypy-projectdavid_common.*]
ignore_missing_imports = True

[mypy-sentence_transformers.*]
ignore_missing_imports = True