[mypy]
# 1. CORE CONFIG
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
# This ensures Mypy actually looks inside your functions
check_untyped_defs = True

# 2. THE "NOISE REDUCER"
# We ignore missing imports globally to handle third-party libs without stubs
ignore_missing_imports = True

# 3. ARCHITECTURE-SPECIFIC SUPPRESSIONS
# name-defined: Fixes the "ent_validator.UserRead is not defined" errors
# union-attr: Fixes the remaining "Item None has no attribute rstrip" errors
# import-untyped: Fixes the "module missing library stubs" errors
disable_error_code = name-defined, union-attr, import-untyped, attr-defined

# 4. SPECIFIC OVERRIDES
# These libraries are either untyped or have complex internal structures
[mypy-requests.*]
ignore_missing_imports = True

[mypy-nest_asyncio.*]
ignore_missing_imports = True

[mypy-projectdavid_common.*]
ignore_missing_imports = True

[mypy-sentence_transformers.*]
ignore_missing_imports = True

[mypy-sseclient.*]
ignore_missing_imports = True
