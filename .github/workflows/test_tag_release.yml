name: Lint, Test, Tag, and Publish

on:
  push:
    branches:
      - '**'

permissions:
  contents: write
  id-token: write

env:
  TEST_PYPI_URL: https://test.pypi.org/legacy/
  PROD_PYPI_URL: https://upload.pypi.org/legacy/

jobs:
  lint_and_security:
    name: 🧹 Lint & 🛡️ Security
    runs-on: ubuntu-latest
    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🔧 Install Lint & Security Tools
        run: |
          python -m pip install --upgrade pip
          # Install the specific security and linting tools
          pip install black isort bandit safety mypy
          # Install the SDK in editable mode with all dev dependencies
          pip install -e ".[dev]"

      - name: ⚫ Black (Format Check)
        run: black --check .

      - name: 🔀 isort (Import Sort Check)
        run: isort --check .

      - name: 🛡️ Mypy (Static Type Analysis)
        # This ensures your PEP 561 (py.typed) support is accurate for IDEs
        run: mypy src/projectdavid

      - name: 🛡️ Bandit (Static Security Analysis)
        # Scans for common security issues (hardcoded keys, missing timeouts, etc.)
        run: bandit -r src/ -x tests/

      - name: 🛡️ Safety (Dependency Vulnerability Check)
        # Scans your dependency tree for known CVEs.
        # We use continue-on-error to avoid blocking releases for low-risk warnings,
        # but the results will still appear in your GitHub Action logs.
        continue-on-error: true
        run: safety check



  test:
    name: ✅ Test (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint_and_security
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: 📦 Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e ".[dev]"
      - name: ✅ Run tests
        run: pytest tests/

  release:
    name: 🚀 Tag, Build, and Publish
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔧 Install Node & Semantic Release
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 Install Plugins
        run: |
          npm install -g semantic-release \
            @semantic-release/git \
            @semantic-release/changelog \
            @semantic-release/github \
            @semantic-release/exec

      - name: 🔢 Run Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: 🏗️ Build Package
        # Build only happens AFTER semantic-release has patched pyproject.toml
        run: |
          pip install build
          python -m build

      - name: 🧠 Decide Target
        id: target
        run: |
          if [[ "${{ github.ref_name }}" == "main" || "${{ github.ref_name }}" == "master" ]]; then
            echo "repo_url=${{ env.PROD_PYPI_URL }}" >> $GITHUB_OUTPUT
            echo "token_name=PROD_PYPI_TOKEN" >> $GITHUB_OUTPUT
          else
            echo "repo_url=${{ env.TEST_PYPI_URL }}" >> $GITHUB_OUTPUT
            echo "token_name=TEST_PYPI_TOKEN" >> $GITHUB_OUTPUT
          fi

      - name: 📦 Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: "__token__"
          password: ${{ secrets[steps.target.outputs.token_name] }}
          repository_url: ${{ steps.target.outputs.repo_url }}
          skip-existing: true
